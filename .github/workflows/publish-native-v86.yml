name: Build and publish native v86 appliance

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Mutable OCI release channel to advance after verification
        required: true
        default: stable
        type: string
  push:
    tags:
      - 'v86-*'

permissions:
  contents: read

concurrency:
  group: native-v86-${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'stable' }}
  cancel-in-progress: false

jobs:
  validate_config:
    name: Validate publish configuration
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Validate OCI release coordinates
        shell: bash
        env:
          OCI_PUBLIC_BASE_URL: ${{ vars.OCI_PUBLIC_BASE_URL }}
          OCI_OBJECT_PREFIX: ${{ vars.OCI_OBJECT_PREFIX || 'anycast-lab/native-v86' }}
          OCI_CORS_ORIGIN: ${{ vars.OCI_CORS_ORIGIN || 'https://anycast.guide' }}
          OCI_PAR_EXPIRES_AT: ${{ vars.OCI_PAR_EXPIRES_AT }}
          RELEASE_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'stable' }}
        run: |
          set -euo pipefail
          for variable in OCI_PUBLIC_BASE_URL OCI_PAR_EXPIRES_AT; do
            if [[ -z ${!variable:-} ]]; then
              echo "Required OCI publish configuration is missing: $variable" >&2
              exit 1
            fi
          done
          if [[ ! $OCI_PUBLIC_BASE_URL =~ ^https://[^/?#@]+/n/[A-Za-z0-9._-]+/b/[A-Za-z0-9._-]+/o/?$ ]]; then
            echo 'OCI_PUBLIC_BASE_URL must be an HTTPS native Object Storage object URL' >&2
            exit 1
          fi
          if [[ ! $OCI_CORS_ORIGIN =~ ^https://[^/?#]+$ ]]; then
            echo 'OCI_CORS_ORIGIN must be an HTTPS origin without a path' >&2
            exit 1
          fi
          if [[ ! $RELEASE_CHANNEL =~ ^[a-z0-9]([a-z0-9._-]{0,62}[a-z0-9])?$ ]]; then
            echo 'Invalid release channel' >&2
            exit 1
          fi
          if [[ ! $OCI_OBJECT_PREFIX =~ ^[A-Za-z0-9._-]+(/[A-Za-z0-9._-]+)*$ ]]; then
            echo 'Invalid OCI object prefix' >&2
            exit 1
          fi
          IFS='/' read -r -a segments <<< "$OCI_OBJECT_PREFIX"
          for segment in "${segments[@]}"; do
            if [[ $segment == '.' || $segment == '..' ]]; then
              echo 'Invalid OCI object prefix' >&2
              exit 1
            fi
          done
          if [[ ! $OCI_PAR_EXPIRES_AT =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(\.[0-9]{1,9})?Z$ ]]; then
            echo 'OCI_PAR_EXPIRES_AT must be a UTC ISO-8601 timestamp' >&2
            exit 1
          fi
          expires_epoch=$(date --date="$OCI_PAR_EXPIRES_AT" +%s) || {
            echo 'OCI_PAR_EXPIRES_AT must be a real UTC ISO-8601 timestamp' >&2
            exit 1
          }
          if (( expires_epoch <= $(date +%s) + 30 * 24 * 60 * 60 )); then
            echo 'OCI publishing PAR expires in 30 days or less; rotate it before publishing' >&2
            exit 1
          fi

  build_test:
    name: Build and test
    needs: validate_config
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    outputs:
      manifest_digest: ${{ steps.release.outputs.manifest_digest }}
    env:
      BR2_CCACHE_DIR: ${{ github.workspace }}/appliances/v86/.work/ccache
      PGO_PROFILE_DIR: ${{ github.workspace }}/appliances/v86/.work/pgo/profiles
      PGO_RAW_DIR: ${{ github.workspace }}/appliances/v86/.work/pgo/raw

    steps:
      - name: Check out the appliance source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Calculate the appliance build-input digest
        id: appliance_inputs
        shell: bash
        run: |
          set -euo pipefail
          digest=$(node appliances/v86/scripts/appliance-cache-key.mjs)
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Calculate the PGO training-context digest
        id: pgo_context
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p appliances/v86/.work/pgo
          digest=$(node appliances/v86/scripts/pgo-profile-set.mjs context \
            --root appliances/v86 \
            --output appliances/v86/.work/pgo/profile-context.json)
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Restore the trusted PGO profile set
        id: pgo_profile_cache
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master'
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: appliances/v86/.work/pgo/profiles
          key: native-v86-pgo-profiles-v1-${{ runner.os }}-${{ runner.arch }}-${{ steps.pgo_context.outputs.digest }}

      - name: Reclaim hosted-runner disk space
        run: |
          set -euo pipefail
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup
          df -h "$GITHUB_WORKSPACE"

      - name: Install Buildroot host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            bc \
            bison \
            build-essential \
            ca-certificates \
            cpio \
            curl \
            file \
            flex \
            git \
            libncurses-dev \
            patch \
            perl \
            python3 \
            rsync \
            unzip \
            wget \
            xz-utils

      - name: Restore pinned source downloads
        id: source_downloads_cache
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            appliances/v86/.work/downloads
            appliances/v86/.work/buildroot-downloads
          key: native-v86-downloads-${{ hashFiles('appliances/v86/versions.env', 'appliances/v86/buildroot/**') }}
          restore-keys: |
            native-v86-downloads-

      - name: Restore the Buildroot compiler cache for training
        id: ccache_training_restore
        if: github.ref == 'refs/heads/master' && github.event_name == 'workflow_dispatch' && steps.pgo_profile_cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: appliances/v86/.work/ccache
          key: native-v86-ccache-v1-${{ runner.os }}-${{ runner.arch }}-${{ steps.appliance_inputs.outputs.digest }}-${{ github.run_id }}
          restore-keys: |
            native-v86-ccache-v1-${{ runner.os }}-${{ runner.arch }}-${{ steps.appliance_inputs.outputs.digest }}-
            native-v86-ccache-v1-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: 1.3.1

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Install the pinned Chromium runtime
        run: bunx playwright install --with-deps chromium

      - name: Build the instrumented native appliance
        if: steps.pgo_profile_cache.outputs.cache-hit != 'true'
        env:
          ANYCAST_PGO_MODE: generate
          JOBS: '2'
          LLVM_JOBS: '2'
        run: ./appliances/v86/scripts/build-image.sh

      - name: Verify the instrumented native bundle
        if: steps.pgo_profile_cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          EXPECTED_PGO_CONTEXT: ${{ steps.pgo_context.outputs.digest }}
        run: |
          set -euo pipefail
          manifest_line=$(node appliances/v86/scripts/verify-manifest.mjs appliances/v86/dist/manifest.json)
          if [[ "$manifest_line" != "$(cat appliances/v86/dist/manifest.sha256)" ]]; then
            echo 'Instrumented manifest.sha256 does not match the verified appliance bundle' >&2
            exit 1
          fi
          node - <<'NODE'
          const { readFileSync } = require('node:fs');
          const manifest = JSON.parse(readFileSync('appliances/v86/dist/manifest.json', 'utf8'));
          if (manifest.pgo?.mode !== 'generate') throw new Error('Training bundle is not PGO-instrumented');
          if (manifest.pgo.contextSha256 !== process.env.EXPECTED_PGO_CONTEXT) {
            throw new Error('Training bundle PGO context does not match this workflow');
          }
          NODE

      - name: Build the instrumented lab
        if: steps.pgo_profile_cache.outputs.cache-hit != 'true'
        run: bun run build:required

      - name: Train BIRD and FRR in the native browser lab
        if: steps.pgo_profile_cache.outputs.cache-hit != 'true'
        env:
          ANYCAST_LAB_NATIVE_MODE: local
          ANYCAST_LAB_REQUIRE_NATIVE: '1'
          ANYCAST_LAB_COLLECT_PGO: '1'
          ANYCAST_LAB_PGO_RAW_DIR: ${{ env.PGO_RAW_DIR }}
        run: bunx playwright test e2e/native-vm.spec.ts

      - name: Merge and seal the trained PGO profiles
        if: steps.pgo_profile_cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -s "$PGO_RAW_DIR/training-evidence.json"
          node appliances/v86/scripts/pgo-profile-set.mjs merge \
            --root appliances/v86 \
            --profile-dir "$PGO_PROFILE_DIR" \
            --build-output appliances/v86/.work/output \
            --bird-archive "$PGO_RAW_DIR/bird-native.tar" \
            --frr-archive "$PGO_RAW_DIR/frr-native.tar" \
            --evidence "$PGO_RAW_DIR/training-evidence.json" \
            --manifest appliances/v86/dist/manifest.json

      - name: Validate the exact PGO profile set
        id: pgo_profiles
        shell: bash
        run: |
          set -euo pipefail
          build_key=$(node appliances/v86/scripts/pgo-profile-set.mjs validate \
            --root appliances/v86 \
            --profile-dir "$PGO_PROFILE_DIR")
          echo "build_key=$build_key" >> "$GITHUB_OUTPUT"

      - name: Restore the verified final native bundle
        id: final_bundle_cache
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master'
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: appliances/v86/dist
          key: native-v86-pgo-bundle-v2-${{ runner.os }}-${{ runner.arch }}-${{ steps.appliance_inputs.outputs.digest }}-${{ steps.pgo_profiles.outputs.build_key }}

      - name: Restore the Buildroot compiler cache for the optimized build
        id: ccache_optimized_restore
        if: github.ref == 'refs/heads/master' && github.event_name == 'workflow_dispatch' && steps.pgo_profile_cache.outputs.cache-hit == 'true' && steps.final_bundle_cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: appliances/v86/.work/ccache
          key: native-v86-ccache-v1-${{ runner.os }}-${{ runner.arch }}-${{ steps.appliance_inputs.outputs.digest }}-${{ github.run_id }}
          restore-keys: |
            native-v86-ccache-v1-${{ runner.os }}-${{ runner.arch }}-${{ steps.appliance_inputs.outputs.digest }}-
            native-v86-ccache-v1-${{ runner.os }}-${{ runner.arch }}-

      - name: Build the optimized native appliance
        if: steps.final_bundle_cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          ANYCAST_PGO_MODE: use
          ANYCAST_PGO_PROFILE_DIR: ${{ env.PGO_PROFILE_DIR }}
          JOBS: '2'
          LLVM_JOBS: '2'
        run: |
          set -euo pipefail
          log=appliances/v86/.work/pgo-use-build.log
          ./appliances/v86/scripts/build-image.sh 2>&1 | tee "$log"
          if grep -Eiq 'hash mismatch|Wbackend-plugin|profile is cold' "$log"; then
            echo 'Optimized build emitted a forbidden PGO backend diagnostic' >&2
            exit 1
          fi

      - name: Verify the optimized native bundle and profile provenance
        shell: bash
        env:
          EXPECTED_PGO_CONTEXT: ${{ steps.pgo_context.outputs.digest }}
          EXPECTED_PROFILE_BUILD_KEY: ${{ steps.pgo_profiles.outputs.build_key }}
        run: |
          set -euo pipefail
          manifest_line=$(node appliances/v86/scripts/verify-manifest.mjs \
            --require-pgo-use appliances/v86/dist/manifest.json)
          if [[ "$manifest_line" != "$(cat appliances/v86/dist/manifest.sha256)" ]]; then
            echo 'Optimized manifest.sha256 does not match the verified appliance bundle' >&2
            exit 1
          fi
          node - <<'NODE'
          const { readFileSync } = require('node:fs');
          const manifest = JSON.parse(readFileSync('appliances/v86/dist/manifest.json', 'utf8'));
          if (manifest.pgo?.mode !== 'use') throw new Error('Release bundle is not PGO-optimized');
          if (manifest.pgo.contextSha256 !== process.env.EXPECTED_PGO_CONTEXT) {
            throw new Error('Release bundle PGO context does not match this workflow');
          }
          if (manifest.pgo.profileSetBuildKey !== process.env.EXPECTED_PROFILE_BUILD_KEY) {
            throw new Error('Release bundle does not identify the validated PGO profile set');
          }
          NODE

      - name: Build the final lab
        run: bun run build:required

      - name: Run the TypeScript check
        run: bun run check

      - name: Run lint
        run: bun run lint

      - name: Run unit tests
        run: bun run test

      - name: Run the native BIRD ABI harness
        run: bun run test:bird-abi

      - name: Run the final native browser test
        env:
          ANYCAST_LAB_NATIVE_MODE: local
          ANYCAST_LAB_REQUIRE_NATIVE: '1'
        run: bunx playwright test e2e/native-vm.spec.ts

      - name: Save verified source downloads
        if: steps.pgo_profile_cache.outputs.cache-hit != 'true' || steps.final_bundle_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            appliances/v86/.work/downloads
            appliances/v86/.work/buildroot-downloads
          key: native-v86-downloads-${{ hashFiles('appliances/v86/versions.env', 'appliances/v86/buildroot/**') }}

      - name: Save the verified Buildroot compiler cache
        if: github.ref == 'refs/heads/master' && github.event_name == 'workflow_dispatch' && (steps.pgo_profile_cache.outputs.cache-hit != 'true' || steps.final_bundle_cache.outputs.cache-hit != 'true')
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: appliances/v86/.work/ccache
          key: native-v86-ccache-v1-${{ runner.os }}-${{ runner.arch }}-${{ steps.appliance_inputs.outputs.digest }}-${{ github.run_id }}

      - name: Save the verified PGO profile set
        if: github.ref == 'refs/heads/master' && github.event_name == 'workflow_dispatch' && steps.pgo_profile_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: appliances/v86/.work/pgo/profiles
          key: native-v86-pgo-profiles-v1-${{ runner.os }}-${{ runner.arch }}-${{ steps.pgo_context.outputs.digest }}

      - name: Save the verified final native bundle
        if: github.ref == 'refs/heads/master' && github.event_name == 'workflow_dispatch' && steps.final_bundle_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: appliances/v86/dist
          key: native-v86-pgo-bundle-v2-${{ runner.os }}-${{ runner.arch }}-${{ steps.appliance_inputs.outputs.digest }}-${{ steps.pgo_profiles.outputs.build_key }}

      - name: Upload the validated PGO profile set
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: native-v86-pgo-profiles-${{ steps.pgo_profiles.outputs.build_key }}
          path: |
            appliances/v86/.work/pgo/profiles/profile-set.json
            appliances/v86/.work/pgo/profiles/bird.profdata
            appliances/v86/.work/pgo/profiles/frr-libfrr.profdata
            appliances/v86/.work/pgo/profiles/frr-libmgmt-be-nb.profdata
            appliances/v86/.work/pgo/profiles/frr-bgpd.profdata
            appliances/v86/.work/pgo/profiles/frr-zebra.profdata
            appliances/v86/.work/pgo/profiles/frr-ospfd.profdata
            appliances/v86/.work/pgo/profiles/training-evidence.json
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Discard the large intermediate build tree
        shell: bash
        run: |
          set -euo pipefail
          source appliances/v86/versions.env
          rm -rf \
            "appliances/v86/.work/buildroot-$BUILDROOT_VERSION" \
            appliances/v86/.work/output \
            appliances/v86/.work/v86-package
          df -h "$GITHUB_WORKSPACE"

      - name: Run the remaining browser tests
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t specs < <(find e2e -maxdepth 1 -type f -name '*.spec.ts' ! -name 'native-vm.spec.ts' -print | sort)
          if (( ${#specs[@]} == 0 )); then
            echo 'No non-native browser tests were found' >&2
            exit 1
          fi
          bunx playwright test "${specs[@]}"

      - name: Verify the release bundle
        id: release
        shell: bash
        run: |
          set -euo pipefail
          manifest_line=$(node appliances/v86/scripts/verify-manifest.mjs \
            --require-pgo-use appliances/v86/dist/manifest.json)
          if [[ "$manifest_line" != "$(cat appliances/v86/dist/manifest.sha256)" ]]; then
            echo 'Generated manifest.sha256 does not match the verified appliance bundle' >&2
            exit 1
          fi
          digest=${manifest_line%% *}
          echo "manifest_digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Upload the verified workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: native-v86-${{ steps.release.outputs.manifest_digest }}
          path: |
            appliances/v86/dist/manifest.json
            appliances/v86/dist/manifest.sha256
            appliances/v86/dist/router-bzimage.bin
            appliances/v86/dist/seabios.bin
            appliances/v86/dist/vgabios.bin
            appliances/v86/dist/v86.wasm
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

  publish:
    name: Publish to OCI Object Storage
    needs: build_test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: native-v86-publish
    env:
      OCI_PUBLIC_BASE_URL: ${{ vars.OCI_PUBLIC_BASE_URL }}
      OCI_OBJECT_PREFIX: ${{ vars.OCI_OBJECT_PREFIX || 'anycast-lab/native-v86' }}
      OCI_CORS_ORIGIN: ${{ vars.OCI_CORS_ORIGIN || 'https://anycast.guide' }}
      RELEASE_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'stable' }}
      SOURCE_REVISION: ${{ github.sha }}

    steps:
      - name: Check out the publisher at the verified revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Download the verified native bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: native-v86-${{ needs.build_test.outputs.manifest_digest }}
          path: appliances/v86/dist

      - name: Install HTTP publishing dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends curl

      - name: Prepare the immutable release status
        id: release
        shell: bash
        run: |
          set -euo pipefail
          manifest_line=$(node appliances/v86/scripts/verify-manifest.mjs \
            --require-pgo-use appliances/v86/dist/manifest.json)
          if [[ "$manifest_line" != "$(cat appliances/v86/dist/manifest.sha256)" ]]; then
            echo 'Downloaded manifest.sha256 does not match the verified appliance bundle' >&2
            exit 1
          fi
          digest=${manifest_line%% *}
          if [[ "$digest" != "${{ needs.build_test.outputs.manifest_digest }}" ]]; then
            echo 'Downloaded bundle digest does not match the build job output' >&2
            exit 1
          fi
          manifest_url="${OCI_PUBLIC_BASE_URL%/}/$OCI_OBJECT_PREFIX/objects/sha256/$digest/manifest.json"
          status_path="$RUNNER_TEMP/native-v86-release-status.json"
          published_at=$(date -u '+%Y-%m-%dT%H:%M:%S.000Z')
          node appliances/v86/scripts/release-status.mjs create \
            --manifest appliances/v86/dist/manifest.json \
            --manifest-sha256 appliances/v86/dist/manifest.sha256 \
            --manifest-url "$manifest_url" \
            --channel "$RELEASE_CHANNEL" \
            --generation "${{ github.run_number }}" \
            --source-revision "$SOURCE_REVISION" \
            --published-at "$published_at" \
            --output "$status_path"
          node appliances/v86/scripts/release-status.mjs validate --status "$status_path"
          echo "status_path=$status_path" >> "$GITHUB_OUTPUT"

      - name: Publish immutable objects and advance the OCI channel
        env:
          OCI_PAR_BASE_URL: ${{ secrets.OCI_PAR_BASE_URL }}
          RELEASE_STATUS_PATH: ${{ steps.release.outputs.status_path }}
        run: appliances/v86/scripts/publish-oci.sh
